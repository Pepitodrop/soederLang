name: COBOL v2

on:
  push:
    branches: [cobol-core-v2, cobol-v2-parity-phase1]
  pull_request:
    paths:
      - 'cobol/**'
      - 'frontend/**'
      - '.github/workflows/cobol-v2.yml'

permissions:
  contents: read

jobs:
  cobol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol
      - name: Compile and test COBOL runtime
        working-directory: cobol
        run: make test 2>&1 | tee build.log
      - name: Upload COBOL diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobol-build-log
          path: cobol/build.log

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Build React and TypeScript client
        working-directory: frontend
        run: npm run build
