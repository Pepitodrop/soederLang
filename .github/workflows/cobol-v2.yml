name: COBOL v2

on:
  push:
    branches: [cobol-core-v2, cobol-v2-parity-phase1, cobol-v2-parity-phase4]
  pull_request:
    paths:
      - 'cobol/**'
      - 'frontend/**'
      - 'src/aliases.js'
      - 'scripts/check-cobol-conformance.mjs'
      - 'test/conformance/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'deploy/**'
      - '.github/workflows/cobol-v2.yml'

permissions:
  contents: read

jobs:
  cobol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol
      - name: Compile and test COBOL runtime
        working-directory: cobol
        run: make test 2>&1 | tee build.log
      - name: Test all canonical aliases through COBOL launcher
        run: |
          chmod +x cobol/bin/soeder-v2
          node --input-type=module <<'NODE'
          import { spawnSync } from 'node:child_process';
          import { SOEDER_ALIASES } from './src/aliases.js';
          if (SOEDER_ALIASES.length !== 100) throw new Error(`expected 100 aliases, got ${SOEDER_ALIASES.length}`);
          const smoke = 'FOODBLOGGER URTEIL 42.\nHANDY AUS ESSEN KOMMT.\n';
          const result = spawnSync('cobol/bin/soeder-v2', [], { input: smoke, encoding: 'utf8' });
          if (result.status !== 0 || !result.stdout.includes('42')) throw new Error(result.stderr || 'alias execution failed');
          NODE
      - name: Compare v1 and GnuCOBOL conformance output
        run: npm run conformance:cobol
      - name: Upload COBOL diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobol-build-log
          path: cobol/build.log

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Build React and TypeScript client
        working-directory: frontend
        run: npm run build

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production container
        run: docker build -t soederlang-v2 .
