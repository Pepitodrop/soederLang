name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run release checks
        run: npm run ci

      - name: Build package tarball
        id: package
        shell: bash
        run: |
          package_file="$(npm pack --silent)"
          echo "file=$package_file" >> "$GITHUB_OUTPUT"

      - name: Publish to npm when configured
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::notice::NPM_TOKEN is not configured; skipping npm publication."
            exit 0
          fi
          npm publish --provenance --access public

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_FILE: ${{ steps.package.outputs.file }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$PACKAGE_FILE" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$PACKAGE_FILE" \
              --verify-tag \
              --generate-notes \
              --title "SöderLang $GITHUB_REF_NAME"
          fi
