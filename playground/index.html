<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SöderLang Playground</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <div><strong>SöderLang Playground</strong><span>v1.0</span></div>
    <button id="run" type="button">Run</button>
  </header>
  <main>
    <section class="editor-panel">
      <label for="source">Source</label>
      <textarea id="source" spellcheck="false"></textarea>
    </section>
    <section class="results">
      <div class="tabs" role="tablist">
        <button data-tab="output" class="active">Output</button>
        <button data-tab="ast">AST</button>
        <button data-tab="bytecode">Bytecode</button>
        <button data-tab="preview">Preview</button>
      </div>
      <pre id="output" class="pane active"></pre>
      <pre id="ast" class="pane"></pre>
      <pre id="bytecode" class="pane"></pre>
      <iframe id="preview" class="pane" sandbox="allow-scripts"></iframe>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
